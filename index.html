<!DOCTYPE html>
<html>
<head>
    <title>Meeshly - Cart + Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .icon { font-size: 24px; cursor: pointer; position: relative; }
        .count { position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; }
        .page { display: none; }
        .active { display: block; }
        .item { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
        button { background: #ff3f6c; color: white; border: none; padding: 10px; width: 100%; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Meeshly</h2>
        <div>
            <span class="icon" onclick="showPage('cart')">🛒<span class="count" id="cartCount">0</span></span>
            <span class="icon" onclick="showPage('orders')">📦</span>
        </div>
    </div>

    <div id="home" class="page active">
        <h3>Products</h3>
        <div class="item">
            <p>T-Shirt - ₹299</p>
            <button onclick="addToCart('T-Shirt', 299)">Add to Cart</button>
        </div>
        <div class="item">
            <p>Jeans - ₹799</p>
            <button onclick="addToCart('Jeans', 799)">Add to Cart</button>
        </div>
    </div>

    <div id="cart" class="page">
        <h3>Your Cart</h3>
        <div id="cartItems"></div>
        <h4>Total: ₹<span id="total">0</span></h4>
        <button onclick="placeOrder()">Place Order</button>
        <button onclick="showPage('home')">Back to Home</button>
    </div>

    <div id="orders" class="page">
        <h3>My Orders</h3>
        <div id="orderList"></div>
        <button onclick="showPage('home')">Back to Home</button>
    </div>

    <script>
        let cart = [];
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');

        function addToCart(name, price) {
            cart.push({name, price});
            updateCart();
            alert('Added to Cart!');
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            let html = '';
            let total = 0;
            cart.forEach((item, i) => {
                html += `<div class="item">${item.name} - ₹${item.price} <button onclick="removeItem(${i})">Remove</button></div>`;
                total += item.price;
            });
            document.getElementById('cartItems').innerHTML = html || 'Cart is empty';
            document.getElementById('total').innerText = total;
        }

        function removeItem(i) {
            cart.splice(i, 1);
            updateCart();
        }

        function placeOrder() {
            if(cart.length === 0) return alert('Cart empty!');
            orders.push({id: Date.now(), items: [...cart], date: new Date().toLocaleString()});
            localStorage.setItem('orders', JSON.stringify(orders));
            cart = [];
            updateCart();
            showPage('orders');
            showOrders();
            alert('Order Placed!');
        }

        function showOrders() {
            let html = '';
            orders.slice().reverse().forEach(order => {
                html += `<div class="item"><b>Order #${order.id}</b><br>${order.date}<br>`;
                order.items.forEach(item => html += `${item.name} - ₹${item.price}<br>`);
                html += `</div>`;
            });
            document.getElementById('orderList').innerHTML = html || 'No orders yet';
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            if(page === 'orders') showOrders();
            if(page === 'cart') updateCart();
        }
        
        showOrders();
    </script>
</body>
</html>
